# Auto-chain after continuous stream feed updates gold:
# gold table change → Lakebase sync → dispatch MV refresh → App/Genie see new data

resources:
  jobs:
    sdp_stream_to_app:
      name: "[${bundle.target}] sdp_stream_to_app"
      trigger:
        pause_status: PAUSED
        table_update:
          table_names:
            - ${var.catalog}.${var.gold_schema}.service_incident
          condition: ANY_UPDATED
          min_time_between_triggers_seconds: 120
          wait_after_last_change_seconds: 60
      tasks:
        - task_key: sync_lakebase
          notebook_task:
            notebook_path: ${workspace.file_path}/notebooks/09_sync_lakebase_from_gold
        - task_key: refresh_dispatch_mv
          depends_on:
            - task_key: sync_lakebase
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ${workspace.file_path}/src/semantic/metrics/refresh_dispatch_mv.sql
      tags:
        migration_source: foundry_build
        client: att
        domain: sdp
        demo: stream_to_app

# Workflow 2 — Create gold ontology, seed baseline data, KPI views, and dispatch MV.
# Run after sdp_cleanup (or on a fresh schema).
# databricks bundle run sdp_semantic_setup -t e2_demo --profile e2-demo-field-eng

resources:
  jobs:
    sdp_semantic_setup:
      name: "[${bundle.target}] sdp_semantic_setup"
      description: "Deploy gold tables, seed demo data, export bronze volumes, and create semantic KPI layer."
      tasks:
        - task_key: bootstrap_bronze_seed
          notebook_task:
            notebook_path: ${workspace.file_path}/notebooks/01_bootstrap_bronze_seed
        - task_key: run_sdp_dlt_full
          depends_on:
            - task_key: bootstrap_bronze_seed
          pipeline_task:
            pipeline_id: ${resources.pipelines.sdp_service_delivery_dlt.id}
            full_refresh: true
        - task_key: deploy_semantic_layer
          depends_on:
            - task_key: run_sdp_dlt_full
          notebook_task:
            notebook_path: ${workspace.file_path}/notebooks/10_deploy_semantic_layer
        - task_key: sync_lakebase
          depends_on:
            - task_key: deploy_semantic_layer
          notebook_task:
            notebook_path: ${workspace.file_path}/notebooks/09_sync_lakebase_from_gold
        - task_key: show_kpis
          depends_on:
            - task_key: sync_lakebase
          notebook_task:
            notebook_path: ${workspace.file_path}/notebooks/05c_show_stream_kpis
      tags:
        client: att
        domain: sdp
        workflow: semantic_setup
      permissions:
        - level: CAN_MANAGE_RUN
          service_principal_name: be33de06-36a1-467e-926b-902c55903267
